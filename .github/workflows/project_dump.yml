name: Project Dump

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar OpenAI
        run: pip install openai

      - name: Ejecutar script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/project_dump.py

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add PROJECT_DUMP.md

          git diff --cached --quiet || git commit -m "auto dump"

          git push
